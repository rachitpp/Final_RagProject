# Free-tier regression net for the backend: unit tests + route-level tests with
# faked Qdrant/Vertex (see backend/tests/). The paid 27-case gold harness
# (backend/eval.py) hits live Vertex + Qdrant and stays an on-demand run — this
# workflow is what guards prompt/parser/retrieval changes on every push.
name: backend-tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests -q
